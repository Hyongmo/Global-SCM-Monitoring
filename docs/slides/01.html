<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>생성형 AI 기반 글로벌 해상 공급망 모니터링 체계 개발 연구</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
    overflow: hidden; background: #0a1628;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.slide-container {
    width: 100vw; height: 100vh; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #0a0f1b;
}
.content-area {
    width: 100%; height: 100%; position: relative;
    /* scaled by JS */
}
@media screen {
    .content-area {
        transform-origin: center center;
        /* JS 기반 스케일링 — fitSlide() */
    }
}
.digital-grid {
    position: absolute; width: 100%; height: 100%;
    background-image:
        linear-gradient(rgba(0, 183, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 183, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: grid-move 20s linear infinite;
}
@keyframes grid-move {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}
.content-wrapper {
    z-index: 10; color: white;
    width: 1920px; height: 1080px;
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    transform-origin: center center;
    animation: fadeInUp 0.8s ease-out;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 50px 80px;
}
@keyframes fadeInUp {
    from { opacity: 0; translate: 0 20px; }
    to { opacity: 1; translate: 0 0; }
}
.kmi-badge {
    position: absolute; right: 80px; bottom: 40px;
    display: flex; align-items: center; gap: 8px;
}
.kmi-badge img {
    height: 24px; width: auto;
    opacity: 0.3;
}
.kmi-badge span {
    font-size: 14px; color: rgba(255,255,255,0.3);
}

/* Title slide specifics */
.wave-bg {
    position: absolute; width: 100%; height: 100%; overflow: hidden;
}
.wave {
    position: absolute; bottom: -50px; width: 200%; height: 300px;
    opacity: 0.06;
    background: linear-gradient(180deg, transparent, #42a5f5);
    border-radius: 50% 50% 0 0;
}
.wave1 { animation: wave 8s ease-in-out infinite; left: -50%; }
.wave2 { animation: wave 10s ease-in-out infinite reverse; left: -30%; opacity: 0.04; bottom: -80px; }
.wave3 { animation: wave 12s ease-in-out infinite; left: -40%; opacity: 0.03; bottom: -110px; }
@keyframes wave {
    0%, 100% { transform: translateX(0) translateY(0); }
    50% { transform: translateX(30px) translateY(-20px); }
}

/* Floating nodes */
.nodes-canvas {
    position: absolute; width: 100%; height: 100%; overflow: hidden;
}
.node {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(100, 181, 246, 0.4), transparent);
    animation: float-node 15s ease-in-out infinite;
}
.node::after {
    content: ''; position: absolute;
    top: 50%; left: 50%; width: 6px; height: 6px;
    margin: -3px 0 0 -3px; border-radius: 50%;
    background: #64b5f6;
    box-shadow: 0 0 10px #64b5f6;
}
@keyframes float-node {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -20px) scale(1.1); }
    50% { transform: translate(-10px, 20px) scale(0.9); }
    75% { transform: translate(20px, 10px) scale(1.05); }
}

/* Connection lines */
.connection-lines {
    position: absolute; width: 100%; height: 100%;
}
.connection-lines svg { width: 100%; height: 100%; }
.conn-line {
    stroke: rgba(100, 181, 246, 0.08);
    stroke-width: 1;
    animation: pulse-line 4s ease-in-out infinite;
}
@keyframes pulse-line {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
}

/* Glow orbs */
.glow-orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px);
    animation: orb-drift 20s ease-in-out infinite;
}
@keyframes orb-drift {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(40px, -30px); }
    66% { transform: translate(-20px, 20px); }
}

.title-main {
    font-size: 84px; font-weight: 800;
    text-align: center; line-height: 1.3;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ffffff 0%, #64b5f6 50%, #42a5f5 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
    animation: title-glow 3s ease-in-out infinite alternate;
}
@keyframes title-glow {
    from { filter: drop-shadow(0 0 20px rgba(100,181,246,0)); }
    to { filter: drop-shadow(0 0 20px rgba(100,181,246,0.3)); }
}
.title-sub {
    font-size: 28px; font-weight: 400;
    color: rgba(255, 217, 61, 0.9);
    text-align: center; margin-bottom: 60px;
    letter-spacing: 2px;
}
.divider-line {
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, #64b5f6, transparent);
    margin: 0 auto 50px;
}
.researcher-info {
    text-align: center; font-size: 24px; color: rgba(255,255,255,0.7);
    line-height: 2;
}
.researcher-name {
    font-size: 30px; font-weight: 700; color: #fff;
    margin-bottom: 8px;
}
.researcher-inst {
    font-size: 22px; color: rgba(255,255,255,0.5);
}
.date-info {
    position: absolute; bottom: 80px;
    font-size: 28px; color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
}
</style>
</head>
<body>
<div class="slide-container">
<div class="content-area">
    <div class="digital-grid"></div>

    <!-- Glow orbs -->
    <div class="glow-orb" style="width:400px;height:400px;background:rgba(21,101,192,0.15);top:10%;left:5%;"></div>
    <div class="glow-orb" style="width:350px;height:350px;background:rgba(66,165,245,0.1);top:50%;right:10%;animation-delay:-7s;"></div>
    <div class="glow-orb" style="width:300px;height:300px;background:rgba(255,217,61,0.05);bottom:10%;left:40%;animation-delay:-13s;"></div>

    <!-- Wave background -->
    <div class="wave-bg">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <!-- Floating nodes -->
    <div class="nodes-canvas">
        <div class="node" style="width:40px;height:40px;top:12%;left:8%;animation-delay:0s;"></div>
        <div class="node" style="width:30px;height:30px;top:25%;left:85%;animation-delay:-3s;"></div>
        <div class="node" style="width:35px;height:35px;top:60%;left:15%;animation-delay:-6s;"></div>
        <div class="node" style="width:25px;height:25px;top:75%;left:78%;animation-delay:-9s;"></div>
        <div class="node" style="width:45px;height:45px;top:18%;left:50%;animation-delay:-2s;"></div>
        <div class="node" style="width:28px;height:28px;top:80%;left:45%;animation-delay:-5s;"></div>
        <div class="node" style="width:32px;height:32px;top:40%;left:92%;animation-delay:-8s;"></div>
        <div class="node" style="width:38px;height:38px;top:55%;left:5%;animation-delay:-11s;"></div>
        <div class="node" style="width:22px;height:22px;top:8%;left:70%;animation-delay:-4s;"></div>
        <div class="node" style="width:34px;height:34px;top:90%;left:20%;animation-delay:-7s;"></div>
    </div>

    <!-- Connection lines -->
    <div class="connection-lines">
        <svg viewBox="0 0 1920 1080" preserveAspectRatio="none">
            <line class="conn-line" x1="153" y1="140" x2="960" y2="205" style="animation-delay:0s"/>
            <line class="conn-line" x1="960" y1="205" x2="1632" y2="280" style="animation-delay:-1s"/>
            <line class="conn-line" x1="288" y1="648" x2="960" y2="205" style="animation-delay:-2s"/>
            <line class="conn-line" x1="1497" y1="810" x2="1766" y2="432" style="animation-delay:-3s"/>
            <line class="conn-line" x1="96" y1="648" x2="864" y2="864" style="animation-delay:-1.5s"/>
            <line class="conn-line" x1="1344" y1="97" x2="1766" y2="432" style="animation-delay:-2.5s"/>
        </svg>
    </div>

    <div class="content-wrapper">
        <div class="title-main">생성형 AI 기반 글로벌 해상 공급망<br>모니터링 체계 개발 연구</div>
        <div class="title-sub">- 온톨로지 기반 도메인 지식그래프를 이용하여 -</div>
        <div class="divider-line"></div>
        <div class="researcher-info">
            <div class="researcher-name">전형모, 김한나</div>
            <div class="researcher-inst">해양수산 AX 지원단</div>
            <div class="researcher-inst" style="display:flex;align-items:center;justify-content:center;gap:12px;">
                <img src="kmi_logo_white.png" alt="KMI" style="height:36px;width:auto;opacity:0.7;">
                <span>한국해양수산개발원</span>
            </div>
        </div>
        <div class="date-info">2026. 05</div>
    </div>
</div>
</div>

<script>
(function () {
  const slides = ["01.html", "02.html", "03.html", "04.html", "05.html", "06.html", "07.html", "08.html", "09.html", "10.html", "11.html", "12.html", "13.html", "14.html", "15.html", "16.html", "17.html", "18.html", "19.html", "20.html", "21.html", "22.html", "23.html", "24.html", "25.html", "26.html", "27.html", "28.html", "29.html", "30.html", "31.html"];
  const current = decodeURIComponent(window.location.pathname.split('/').pop() || '');
  const toNFC = s => (String.prototype.normalize ? s.normalize('NFC') : s);
  const slidesN = slides.map(toNFC);
  let idx = slidesN.indexOf(toNFC(current));
  if (idx < 0) idx = 0;
  function go(i) { const t = slides[(i + slides.length) % slides.length]; if (t) window.location.href = t; }
  window.addEventListener('keydown', function (e) {
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (e.target && (e.target.isContentEditable || ['input','textarea','select'].includes(tag))) return;
    if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); go(idx + 1); }
    else if (['ArrowLeft','PageUp','Backspace'].includes(e.key)) { e.preventDefault(); go(idx - 1); }
    else if (e.key === 'Home') { e.preventDefault(); go(0); }
    else if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  }, true);
  document.addEventListener('click', function (e) {
    if (!e.target.closest('a,button,input,textarea,select,video,audio,label,svg')) go(idx + 1);
  });
  const hud = document.createElement('div');
  Object.assign(hud.style, {
    position:'fixed', right:'16px', bottom:'12px', padding:'6px 10px',
    fontSize:'20px', borderRadius:'10px', background:'rgba(0,0,0,0.35)',
    color:'#fff', backdropFilter:'blur(3px)', zIndex:9999, userSelect:'none', pointerEvents:'none'
  });
  hud.textContent = (idx+1)+' / '+slides.length+'  •  ← / → or click';
  document.body.appendChild(hud);
})();
</script>
</body>
<script>
function fitSlide(){
    var c=document.querySelector('.content-wrapper');
    if(!c)return;
    var sx=window.innerWidth/1920, sy=window.innerHeight/1080;
    var s=Math.min(sx,sy);
    c.style.transform='translate(-50%,-50%) scale('+s+')';
    var b=document.querySelector('.kmi-badge');
    if(b){b.style.transform='scale('+s+')';b.style.transformOrigin='top right';}
}
fitSlide();
window.addEventListener('resize',fitSlide);
</script>
</html>
