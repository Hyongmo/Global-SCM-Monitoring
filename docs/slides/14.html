<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>온톨로지 KG 스키마 — 인터랙티브 뷰</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
    overflow: hidden; background: #0a1628;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.slide-container {
    width: 100vw; height: 100vh; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #0a0f1b;
}
.content-area {
    width: 1920px; height: 1080px; position: relative;
    max-width: 100vw; max-height: 100vh;
}
@media screen {
    .content-area {
        transform-origin: center center;
        transform: scale(min(calc(100vw / 1920), calc(100vh / 1080)));
    }
}
.content-wrapper {
    position: relative; z-index: 10; color: white;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 20px 40px;
    animation: fadeInUp 1s ease-out;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.header-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
    flex-shrink: 0;
}
.slide-title {
    font-size: 36px; font-weight: 800;
    background: linear-gradient(135deg, #fff, #64b5f6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hint {
    font-size: 24px; color: rgba(255,255,255,0.4);
    display: flex; align-items: center; gap: 8px;
}
.hint-icon {
    display: inline-block; width: 24px; height: 24px;
    border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
    text-align: center; line-height: 24px; font-size: 18px;
}
.iframe-container {
    flex: 1; border-radius: 16px; overflow: hidden;
    border: 1px solid rgba(100, 181, 246, 0.2);
    box-shadow: 0 0 40px rgba(66, 165, 245, 0.1);
    position: relative;
}
.iframe-container iframe {
    width: 100%; height: 100%; border: none;
}
.iframe-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    border-radius: 16px;
    box-shadow: inset 0 0 60px rgba(10, 15, 27, 0.5);
}
.kmi-badge {
    position: absolute; right: 60px; top: 30px;
    display: flex; align-items: center; gap: 8px;
    z-index: 20;
}
.kmi-badge img {
    height: 28px; width: auto;
    opacity: 0.4;
}
.kmi-badge span {
    font-size: 18px; color: rgba(255,255,255,0.35);
    font-weight: 500;
}
</style>
</head>
<body>
<div class="slide-container">
<div class="content-area">
    <div class="content-wrapper">
        <div class="header-bar">
            <div class="slide-title">온톨로지 KG 스키마 — 인터랙티브 뷰</div>
            <div class="hint">
                노드를 클릭하면 상세 속성 확인 가능 &nbsp;
                <span class="hint-icon">🖱</span>
            </div>
        </div>
        <div class="iframe-container">
            <iframe src="ontology_schema_v8.html" allow="fullscreen"></iframe>
            <div class="iframe-overlay"></div>
        </div>
    </div>
    <div class="kmi-badge"><img src="kmi_logo_white.png" alt="KMI"><span>한국해양수산개발원</span></div>
</div>
</div>

<script>
(function () {
  const slides = ["01.html", "02.html", "03.html", "04.html", "05.html", "06.html", "07.html", "08.html", "09.html", "10.html", "11.html", "12.html", "13.html", "14.html", "15.html", "16.html", "17.html", "18.html", "19.html", "20.html", "21.html", "22.html", "23.html", "24.html", "25.html"];
  const current = decodeURIComponent(window.location.pathname.split('/').pop() || '');
  const toNFC = s => (String.prototype.normalize ? s.normalize('NFC') : s);
  const slidesN = slides.map(toNFC);
  let idx = slidesN.indexOf(toNFC(current));
  if (idx < 0) idx = 0;
  function go(i) { const t = slides[(i + slides.length) % slides.length]; if (t) window.location.href = t; }
  window.addEventListener('keydown', function (e) {
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (e.target && (e.target.isContentEditable || ['input','textarea','select'].includes(tag))) return;
    if (['ArrowRight','PageDown'].includes(e.key)) { e.preventDefault(); go(idx + 1); }
    else if (['ArrowLeft','PageUp','Backspace'].includes(e.key)) { e.preventDefault(); go(idx - 1); }
    else if (e.key === 'Home') { e.preventDefault(); go(0); }
    else if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  }, true);
  /* NOTE: no click-to-advance here — the iframe needs clicks for interaction */
  const hud = document.createElement('div');
  Object.assign(hud.style, {
    position:'fixed', right:'16px', bottom:'12px', padding:'6px 10px',
    fontSize:'20px', borderRadius:'10px', background:'rgba(0,0,0,0.35)',
    color:'#fff', backdropFilter:'blur(3px)', zIndex:9999, userSelect:'none', pointerEvents:'none'
  });
  hud.textContent = (idx+1)+' / '+slides.length+'  •  ← / → 키로 이동  •  스키마 클릭 가능';
  document.body.appendChild(hud);
})();
</script>
</body>
</html>
