<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>감사합니다 — Q&A</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
    overflow: hidden; background: #0a1628;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.slide-container {
    width: 100vw; height: 100vh; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #0a0f1b;
}
.content-area {
    width: 100%; height: 100%; position: relative;
    /* scaled by JS */
}
@media screen {
    .content-area {
        transform-origin: center center;
        /* JS 기반 스케일링 — fitSlide() */
    }
}
.digital-grid {
    position: absolute; width: 100%; height: 100%;
    background-image:
        linear-gradient(rgba(0, 183, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 183, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: grid-move 20s linear infinite;
}
@keyframes grid-move {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}
.content-wrapper {
    z-index: 10; color: white;
    width: 1920px; height: 1080px;
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    transform-origin: center center;
    animation: fadeInUp 0.8s ease-out;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 50px 80px;
}
@keyframes fadeInUp {
    from { opacity: 0; translate: 0 20px; }
    to { opacity: 1; translate: 0 0; }
}
.kmi-badge {
    position: absolute; right: 60px; top: 30px;
    display: flex; align-items: center; gap: 8px;
    z-index: 20;
}
.kmi-badge img {
    height: 28px; width: auto;
    opacity: 0.4;
}
.kmi-badge span {
    font-size: 18px; color: rgba(255,255,255,0.35);
    font-weight: 500;
}
.glow-orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px);
    animation: orb-drift 20s ease-in-out infinite;
}
@keyframes orb-drift {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(40px, -30px); }
    66% { transform: translate(-20px, 20px); }
}

/* Wave background (calmer version) */
.wave-bg {
    position: absolute; width: 100%; height: 100%; overflow: hidden;
}
.wave {
    position: absolute; bottom: -50px; width: 200%; height: 300px;
    opacity: 0.04;
    background: linear-gradient(180deg, transparent, #42a5f5);
    border-radius: 50% 50% 0 0;
}
.wave1 { animation: wave 12s ease-in-out infinite; left: -50%; }
.wave2 { animation: wave 16s ease-in-out infinite reverse; left: -30%; opacity: 0.03; bottom: -80px; }
.wave3 { animation: wave 20s ease-in-out infinite; left: -40%; opacity: 0.02; bottom: -110px; }
@keyframes wave {
    0%, 100% { transform: translateX(0) translateY(0); }
    50% { transform: translateX(30px) translateY(-20px); }
}

/* Floating nodes (fewer, calmer) */
.nodes-canvas {
    position: absolute; width: 100%; height: 100%; overflow: hidden;
}
.node {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(100, 181, 246, 0.3), transparent);
    animation: float-node 20s ease-in-out infinite;
}
.node::after {
    content: ''; position: absolute;
    top: 50%; left: 50%; width: 5px; height: 5px;
    margin: -2.5px 0 0 -2.5px; border-radius: 50%;
    background: #64b5f6;
    box-shadow: 0 0 8px #64b5f6;
}
@keyframes float-node {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(20px, -15px) scale(1.05); }
    50% { transform: translate(-8px, 15px) scale(0.95); }
    75% { transform: translate(15px, 8px) scale(1.02); }
}

.thank-you {
    font-size: 120px; font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #64b5f6 50%, #42a5f5 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
    animation: title-glow 3s ease-in-out infinite alternate;
}
@keyframes title-glow {
    from { filter: drop-shadow(0 0 20px rgba(100,181,246,0)); }
    to { filter: drop-shadow(0 0 20px rgba(100,181,246,0.3)); }
}

.qa-text {
    font-size: 54px; font-weight: 300;
    color: rgba(255,217,61,0.8);
    letter-spacing: 8px;
    margin-bottom: 60px;
}

.divider-line {
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, #64b5f6, transparent);
    margin-bottom: 50px;
}

.contact-info {
    text-align: center;
    margin-bottom: 50px;
}
.contact-name {
    font-size: 42px; font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
}
.contact-name-en {
    font-size: 27px; font-weight: 400;
    color: rgba(255,255,255,0.4);
    margin-bottom: 12px;
}
.contact-inst {
    font-size: 33px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
}
.contact-email {
    font-size: 27px;
    color: rgba(100,181,246,0.7);
}

.service-links {
    display: flex; gap: 32px;
}
.service-link {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(100,181,246,0.15);
    border-radius: 12px;
    padding: 16px 28px;
    text-align: center;
    transition: all 0.3s;
}
.service-link:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(100,181,246,0.3);
}
.service-link-label {
    font-size: 21px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 6px;
}
.service-link-url {
    font-size: 26px;
    color: #64b5f6;
    letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div class="slide-container">
<div class="content-area">
    <div class="digital-grid"></div>

    <!-- Glow orbs -->
    <div class="glow-orb" style="width:500px;height:500px;background:rgba(21,101,192,0.12);top:5%;left:10%;"></div>
    <div class="glow-orb" style="width:400px;height:400px;background:rgba(66,165,245,0.08);top:40%;right:5%;animation-delay:-7s;"></div>
    <div class="glow-orb" style="width:350px;height:350px;background:rgba(255,217,61,0.04);bottom:5%;left:35%;animation-delay:-13s;"></div>

    <!-- Waves (calmer) -->
    <div class="wave-bg">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <!-- Floating nodes (fewer) -->
    <div class="nodes-canvas">
        <div class="node" style="width:30px;height:30px;top:15%;left:12%;animation-delay:0s;"></div>
        <div class="node" style="width:25px;height:25px;top:20%;left:82%;animation-delay:-4s;"></div>
        <div class="node" style="width:28px;height:28px;top:70%;left:10%;animation-delay:-8s;"></div>
        <div class="node" style="width:22px;height:22px;top:78%;left:85%;animation-delay:-12s;"></div>
        <div class="node" style="width:35px;height:35px;top:45%;left:5%;animation-delay:-6s;"></div>
        <div class="node" style="width:26px;height:26px;top:30%;left:92%;animation-delay:-10s;"></div>
    </div>

    <div class="content-wrapper">
        <div class="thank-you">감사합니다</div>
        <div class="qa-text">Q & A</div>
        <div class="divider-line"></div>

        <div class="contact-info">
            <div class="contact-name">전형모</div>
            <div class="contact-name-en">Hyongmo Jeon, Ph.D.</div>
            <div class="contact-inst" style="display:flex;align-items:center;justify-content:center;gap:12px;">
                <img src="kmi_logo_white.png" alt="KMI" style="height:36px;width:auto;opacity:0.7;">
                <span>한국해양수산개발원</span>
            </div>
            <div class="contact-email">hmjeon@kmi.re.kr</div>
        </div>

        <div class="service-links">
            <div class="service-link">
                <div class="service-link-label">일일 브리핑</div>
                <div class="service-link-url">scm-briefing.kmi.re.kr</div>
            </div>
            <div class="service-link">
                <div class="service-link-label">주간 모니터링</div>
                <div class="service-link-url">scm-briefing.kmi.re.kr/weekly_report.html</div>
            </div>
        </div>
    </div>
    <div class="kmi-badge"><img src="kmi_logo_white.png" alt="KMI"><span>한국해양수산개발원</span></div>
</div>
</div>

<script>
(function () {
  const slides = ["01.html", "02.html", "03.html", "04.html", "05.html", "06.html", "07.html", "08.html", "09.html", "10.html", "11.html", "12.html", "13.html", "14.html", "15.html", "16.html", "17.html", "18.html", "19.html", "20.html", "21.html", "22.html", "23.html", "24.html", "25.html", "26.html", "27.html", "28.html", "29.html", "30.html", "31.html"];
  const current = decodeURIComponent(window.location.pathname.split('/').pop() || '');
  const toNFC = s => (String.prototype.normalize ? s.normalize('NFC') : s);
  const slidesN = slides.map(toNFC);
  let idx = slidesN.indexOf(toNFC(current));
  if (idx < 0) idx = 0;
  function go(i) { const t = slides[(i + slides.length) % slides.length]; if (t) window.location.href = t; }
  window.addEventListener('keydown', function (e) {
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (e.target && (e.target.isContentEditable || ['input','textarea','select'].includes(tag))) return;
    if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); go(idx + 1); }
    else if (['ArrowLeft','PageUp','Backspace'].includes(e.key)) { e.preventDefault(); go(idx - 1); }
    else if (e.key === 'Home') { e.preventDefault(); go(0); }
    else if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  }, true);
  document.addEventListener('click', function (e) {
    if (!e.target.closest('a,button,input,textarea,select,video,audio,label,svg')) go(idx + 1);
  });
  const hud = document.createElement('div');
  Object.assign(hud.style, {
    position:'fixed', right:'16px', bottom:'12px', padding:'6px 10px',
    fontSize:'20px', borderRadius:'10px', background:'rgba(0,0,0,0.35)',
    color:'#fff', backdropFilter:'blur(3px)', zIndex:9999, userSelect:'none', pointerEvents:'none'
  });
  hud.textContent = (idx+1)+' / '+slides.length+'  •  ← / → or click';
  document.body.appendChild(hud);
})();
</script>
</body>
<script>
function fitSlide(){
    var c=document.querySelector('.content-wrapper');
    if(!c)return;
    var sx=window.innerWidth/1920, sy=window.innerHeight/1080;
    var s=Math.min(sx,sy);
    c.style.transform='translate(-50%,-50%) scale('+s+')';
    var b=document.querySelector('.kmi-badge');
    if(b){b.style.transform='scale('+s+')';b.style.transformOrigin='top right';}
}
fitSlide();
window.addEventListener('resize',fitSlide);
</script>
</html>
