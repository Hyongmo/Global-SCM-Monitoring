<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>목차</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
    overflow: hidden; background: #0a1628;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.slide-container {
    width: 100vw; height: 100vh; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #0a0f1b;
}
.content-area {
    width: 1920px; height: 1080px; position: relative;
    max-width: 100vw; max-height: 100vh;
}
@media screen {
    .content-area {
        transform-origin: center center;
        transform: scale(min(calc(100vw / 1920), calc(100vh / 1080)));
    }
}
.digital-grid {
    position: absolute; width: 100%; height: 100%;
    background-image:
        linear-gradient(rgba(0, 183, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 183, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: grid-move 20s linear infinite;
}
@keyframes grid-move {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}
.content-wrapper {
    position: relative; z-index: 10; color: white;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 50px 80px;
    animation: fadeInUp 1s ease-out;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.kmi-badge {
    position: absolute; right: 60px; top: 30px;
    display: flex; align-items: center; gap: 8px;
    z-index: 20;
}
.kmi-badge img {
    height: 28px; width: auto;
    opacity: 0.4;
}
.kmi-badge span {
    font-size: 18px; color: rgba(255,255,255,0.35);
    font-weight: 500;
}
.glow-orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px);
    animation: orb-drift 20s ease-in-out infinite;
}
@keyframes orb-drift {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(40px, -30px); }
    66% { transform: translate(-20px, 20px); }
}

.page-title {
    font-size: 63px; font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #64b5f6 50%, #42a5f5 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 50px;
    text-align: center;
}

/* Horizontal TOC rows */
.toc-list {
    display: flex; flex-direction: column;
    gap: 16px;
    flex: 1;
    justify-content: center;
}

.toc-row {
    display: flex; align-items: center; gap: 20px;
    padding: 18px 30px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    transition: all 0.3s;
}
.toc-row:hover {
    background: rgba(255,255,255,0.05);
}

.toc-num {
    width: 50px; height: 50px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 900;
    flex-shrink: 0;
}

.toc-row:nth-child(1) .toc-num { background: rgba(66,165,245,0.15); border: 1px solid rgba(66,165,245,0.3); color: #64b5f6; }
.toc-row:nth-child(2) .toc-num { background: rgba(255,217,61,0.15); border: 1px solid rgba(255,217,61,0.3); color: #ffd93d; }
.toc-row:nth-child(3) .toc-num { background: rgba(102,187,106,0.15); border: 1px solid rgba(102,187,106,0.3); color: #66bb6a; }
.toc-row:nth-child(4) .toc-num { background: rgba(171,71,188,0.15); border: 1px solid rgba(171,71,188,0.3); color: #ce93d8; }
.toc-row:nth-child(5) .toc-num { background: rgba(239,83,80,0.15); border: 1px solid rgba(239,83,80,0.3); color: #ef9a9a; }

.toc-row::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 14px 0 0 14px;
}

.toc-section-title {
    font-size: 39px; font-weight: 800;
    flex: 0 0 450px;
}
.toc-row:nth-child(1) .toc-section-title { color: #90caf9; }
.toc-row:nth-child(2) .toc-section-title { color: #ffd93d; }
.toc-row:nth-child(3) .toc-section-title { color: #a5d6a7; }
.toc-row:nth-child(4) .toc-section-title { color: #ce93d8; }
.toc-row:nth-child(5) .toc-section-title { color: #ef9a9a; }

.toc-divider {
    width: 1px; height: 36px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
}

.toc-items {
    display: flex; align-items: center; gap: 10px;
    flex: 1;
    flex-wrap: wrap;
}

.toc-chip {
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 27px;
    color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
}
.toc-arrow {
    color: rgba(255,255,255,0.15);
    font-size: 27px;
    flex-shrink: 0;
}
</style>
</head>
<body>
<div class="slide-container">
<div class="content-area">
    <div class="digital-grid"></div>
    <div class="glow-orb" style="width:400px;height:400px;background:rgba(21,101,192,0.12);top:10%;left:5%;"></div>
    <div class="glow-orb" style="width:350px;height:350px;background:rgba(66,165,245,0.08);bottom:15%;right:8%;animation-delay:-7s;"></div>

    <div class="content-wrapper">
        <div class="page-title">목차</div>

        <div class="toc-list">
            <!-- I -->
            <div class="toc-row">
                <div class="toc-num">I</div>
                <div class="toc-section-title">연구 배경 및 목적</div>
                <div class="toc-divider"></div>
                <div class="toc-items">
                    <span class="toc-chip">연구 배경</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">연구 목적 및 범위</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">기존 연구의 한계와 차별점</span>
                </div>
            </div>

            <!-- II -->
            <div class="toc-row">
                <div class="toc-num">II</div>
                <div class="toc-section-title">온톨로지 KG 설계</div>
                <div class="toc-divider"></div>
                <div class="toc-items">
                    <span class="toc-chip">시스템 아키텍처</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">KG 개념 및 필요성</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">KG 설계 진화</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">위기 유형 · 6계층 구조</span>
                </div>
            </div>

            <!-- III -->
            <div class="toc-row">
                <div class="toc-num">III</div>
                <div class="toc-section-title">생성형 AI 파이프라인</div>
                <div class="toc-divider"></div>
                <div class="toc-items">
                    <span class="toc-chip">뉴스 데이터 수집</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">AI &times; 지식그래프 활용</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">주간 시나리오 분석</span>
                </div>
            </div>

            <!-- IV -->
            <div class="toc-row">
                <div class="toc-num">IV</div>
                <div class="toc-section-title">실증 분석 및 서비스</div>
                <div class="toc-divider"></div>
                <div class="toc-items">
                    <span class="toc-chip">7개 위기 실증 분석</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">서비스 운영 현황</span>
                </div>
            </div>

            <!-- V -->
            <div class="toc-row">
                <div class="toc-num">V</div>
                <div class="toc-section-title">결론</div>
                <div class="toc-divider"></div>
                <div class="toc-items">
                    <span class="toc-chip">핵심 연구 성과</span>
                    <span class="toc-arrow">&#x25B6;</span>
                    <span class="toc-chip">연구의 한계 및 향후 과제</span>
                </div>
            </div>
        </div>
    </div>
    <div class="kmi-badge"><img src="kmi_logo_white.png" alt="KMI"><span>한국해양수산개발원</span></div>
</div>
</div>

<script>
(function () {
  const slides = ["01.html", "02.html", "03.html", "04.html", "05.html", "06.html", "07.html", "08.html", "09.html", "10.html", "11.html", "12.html", "13.html", "14.html", "15.html", "16.html", "17.html", "18.html", "19.html", "20.html", "21.html", "22.html", "23.html", "24.html", "25.html"];
  const current = decodeURIComponent(window.location.pathname.split('/').pop() || '');
  const toNFC = s => (String.prototype.normalize ? s.normalize('NFC') : s);
  const slidesN = slides.map(toNFC);
  let idx = slidesN.indexOf(toNFC(current));
  if (idx < 0) idx = 0;
  function go(i) { const t = slides[(i + slides.length) % slides.length]; if (t) window.location.href = t; }
  window.addEventListener('keydown', function (e) {
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (e.target && (e.target.isContentEditable || ['input','textarea','select'].includes(tag))) return;
    if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); go(idx + 1); }
    else if (['ArrowLeft','PageUp','Backspace'].includes(e.key)) { e.preventDefault(); go(idx - 1); }
    else if (e.key === 'Home') { e.preventDefault(); go(0); }
    else if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  }, true);
  document.addEventListener('click', function (e) {
    if (!e.target.closest('a,button,input,textarea,select,video,audio,label,svg')) go(idx + 1);
  });
  const hud = document.createElement('div');
  Object.assign(hud.style, {
    position:'fixed', right:'16px', bottom:'12px', padding:'6px 10px',
    fontSize:'20px', borderRadius:'10px', background:'rgba(0,0,0,0.35)',
    color:'#fff', backdropFilter:'blur(3px)', zIndex:9999, userSelect:'none', pointerEvents:'none'
  });
  hud.textContent = (idx+1)+' / '+slides.length+'  •  ← / → or click';
  document.body.appendChild(hud);
})();
</script>
</body>
</html>
