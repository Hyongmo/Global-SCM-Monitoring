<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>연구 배경</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
    overflow: hidden; background: #0a1628;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.slide-container {
    width: 100vw; height: 100vh; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #0a0f1b;
}
.content-area {
    width: 100%; height: 100%; position: relative;
    /* scaled by JS */
}
@media screen {
    .content-area {
        transform-origin: center center;
        /* JS 기반 스케일링 — fitSlide() */
    }
}
.digital-grid {
    position: absolute; width: 100%; height: 100%;
    background-image:
        linear-gradient(rgba(0, 183, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 183, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: grid-move 20s linear infinite;
}
@keyframes grid-move {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}
.content-wrapper {
    z-index: 10; color: white;
    width: 1920px; height: 1080px;
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    transform-origin: center center;
    animation: fadeInUp 0.8s ease-out;
    display: flex; flex-direction: column;
    padding: 50px 80px;
}
@keyframes fadeInUp {
    from { opacity: 0; translate: 0 20px; }
    to { opacity: 1; translate: 0 0; }
}
.kmi-badge {
    position: absolute; right: 60px; top: 30px;
    display: flex; align-items: center; gap: 8px;
    z-index: 20;
}
.kmi-badge img {
    height: 28px; width: auto;
    opacity: 0.4;
}
.kmi-badge span {
    font-size: 18px; color: rgba(255,255,255,0.35);
    font-weight: 500;
}

/* Slide 02 specifics */
.slide-title {
    font-size: 44px; font-weight: 800;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff, #64b5f6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.title-underline {
    width: 80px; height: 3px;
    background: linear-gradient(90deg, #ffd93d, transparent);
    margin-bottom: 50px;
}

/* Stats row */
.stats-row {
    display: flex; gap: 40px; justify-content: center;
    margin-bottom: 60px;
}
.stat-card {
    flex: 1; max-width: 480px;
    background: linear-gradient(135deg, rgba(21,101,192,0.15), rgba(100,181,246,0.05));
    border: 1px solid rgba(100,181,246,0.15);
    border-radius: 20px; padding: 40px 36px;
    text-align: center; position: relative; overflow: hidden;
    transition: transform 0.3s;
}
.stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #42a5f5, #64b5f6, #42a5f5);
}
.stat-icon { font-size: 72px; margin-bottom: 16px; }
.stat-number {
    font-size: 108px; font-weight: 900;
    background: linear-gradient(135deg, #ffd93d, #ffab00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.1;
}
.stat-unit {
    font-size: 42px; font-weight: 700;
    -webkit-text-fill-color: #ffd93d;
}
.stat-label {
    font-size: 30px; color: rgba(255,255,255,0.7);
    margin-top: 10px; line-height: 1.5;
}
.stat-highlight {
    font-size: 24px; color: #64b5f6; margin-top: 6px; font-weight: 600;
}

/* Timeline */
.timeline-section {
    flex: 1; display: flex; flex-direction: column; justify-content: flex-end;
    padding-bottom: 40px;
}
.timeline-label {
    font-size: 33px; font-weight: 700; color: rgba(255,255,255,0.5);
    margin-bottom: 30px; letter-spacing: 2px;
}
.timeline-container {
    position: relative; width: 100%;
}
.timeline-line {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, rgba(100,181,246,0.1), rgba(100,181,246,0.4), rgba(239,83,80,0.6));
    transform: translateY(-50%);
}
.timeline-events {
    display: flex; justify-content: space-between;
    position: relative; z-index: 2;
}
.timeline-event {
    display: flex; flex-direction: column; align-items: center;
    width: 14%; position: relative;
}
.timeline-event:nth-child(odd) .event-content { order: -1; margin-bottom: 16px; }
.timeline-event:nth-child(even) .event-content { margin-top: 16px; }
.event-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: #42a5f5; border: 3px solid #0a0f1b;
    box-shadow: 0 0 12px rgba(66,165,245,0.5);
    position: relative; z-index: 3;
    flex-shrink: 0;
}
.timeline-event:last-child .event-dot {
    background: #ef5350; width: 20px; height: 20px;
    box-shadow: 0 0 16px rgba(239,83,80,0.6);
    animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 16px rgba(239,83,80,0.4); }
    50% { box-shadow: 0 0 24px rgba(239,83,80,0.8); }
}
.event-content { text-align: center; }
.event-year {
    font-size: 27px; font-weight: 800;
    color: #64b5f6; margin-bottom: 4px;
}
.timeline-event:last-child .event-year { color: #ef5350; }
.event-desc {
    font-size: 21px; color: rgba(255,255,255,0.65);
    line-height: 1.4; white-space: nowrap;
}
.timeline-event:last-child .event-desc { color: rgba(239,83,80,0.9); font-weight: 700; }

/* Animated counter */
@keyframes countUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
.stat-number { animation: countUp 0.8s ease-out both; }
.stat-card:nth-child(1) .stat-number { animation-delay: 0.2s; }
.stat-card:nth-child(2) .stat-number { animation-delay: 0.4s; }
.stat-card:nth-child(3) .stat-number { animation-delay: 0.6s; }

.glow-orb {
    position: absolute; border-radius: 50%; filter: blur(80px);
    animation: orb-drift 20s ease-in-out infinite;
}
@keyframes orb-drift {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(40px, -30px); }
    66% { transform: translate(-20px, 20px); }
}
</style>
</head>
<body>
<div class="slide-container">
<div class="content-area">
    <div class="digital-grid"></div>
    <div class="glow-orb" style="width:350px;height:350px;background:rgba(21,101,192,0.12);top:5%;right:10%;"></div>
    <div class="glow-orb" style="width:300px;height:300px;background:rgba(255,217,61,0.04);bottom:15%;left:5%;animation-delay:-10s;"></div>

    <div class="content-wrapper">
        <div class="slide-title">연구 배경</div>
        <div class="title-underline"></div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">⛽</div>
                <div class="stat-number">95<span class="stat-unit">%</span></div>
                <div class="stat-label">에너지 해상 수입 의존도</div>
                <div class="stat-highlight">원유 · LNG · 석탄</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌾</div>
                <div class="stat-number">~99<span class="stat-unit">%</span></div>
                <div class="stat-label">곡물·철광석 해상 수입</div>
                <div class="stat-highlight">식량 · 원자재 안보</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🚢</div>
                <div class="stat-number">99.7<span class="stat-unit">%</span></div>
                <div class="stat-label">국제무역 해상운송 비중</div>
                <div class="stat-highlight">물동량 기준</div>
            </div>
        </div>

        <div class="timeline-section">
            <div class="timeline-label">▎ 해상 공급망 위기 타임라인</div>
            <div class="timeline-container">
                <div class="timeline-line"></div>
                <div class="timeline-events">
                    <div class="timeline-event">
                        <div class="event-content">
                            <div class="event-year">2019</div>
                            <div class="event-desc">일본 반도체<br>소재 수출규제</div>
                        </div>
                        <div class="event-dot"></div>
                    </div>
                    <div class="timeline-event">
                        <div class="event-dot"></div>
                        <div class="event-content">
                            <div class="event-year">2020</div>
                            <div class="event-desc">COVID-19<br>컨테이너 대란</div>
                        </div>
                    </div>
                    <div class="timeline-event">
                        <div class="event-content">
                            <div class="event-year">2021</div>
                            <div class="event-desc">수에즈 좌초<br>요소수 대란</div>
                        </div>
                        <div class="event-dot"></div>
                    </div>
                    <div class="timeline-event">
                        <div class="event-dot"></div>
                        <div class="event-content">
                            <div class="event-year">2022</div>
                            <div class="event-desc">우크라이나<br>전쟁</div>
                        </div>
                    </div>
                    <div class="timeline-event">
                        <div class="event-content">
                            <div class="event-year">2023</div>
                            <div class="event-desc">Red Sea<br>위기</div>
                        </div>
                        <div class="event-dot"></div>
                    </div>
                    <div class="timeline-event">
                        <div class="event-dot"></div>
                        <div class="event-content">
                            <div class="event-year">2026</div>
                            <div class="event-desc">호르무즈 해협<br>봉쇄</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="kmi-badge"><img src="kmi_logo_white.png" alt="KMI"><span>한국해양수산개발원</span></div>
</div>
</div>

<script>
(function () {
  const slides = ["01.html", "02.html", "03.html", "04.html", "05.html", "06.html", "07.html", "08.html", "09.html", "10.html", "11.html", "12.html", "13.html", "14.html", "15.html", "16.html", "17.html", "18.html", "19.html", "20.html", "21.html", "22.html", "23.html", "24.html", "25.html", "26.html", "27.html", "28.html", "29.html", "30.html", "31.html"];
  const current = decodeURIComponent(window.location.pathname.split('/').pop() || '');
  const toNFC = s => (String.prototype.normalize ? s.normalize('NFC') : s);
  const slidesN = slides.map(toNFC);
  let idx = slidesN.indexOf(toNFC(current));
  if (idx < 0) idx = 0;
  function go(i) { const t = slides[(i + slides.length) % slides.length]; if (t) window.location.href = t; }
  window.addEventListener('keydown', function (e) {
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (e.target && (e.target.isContentEditable || ['input','textarea','select'].includes(tag))) return;
    if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); go(idx + 1); }
    else if (['ArrowLeft','PageUp','Backspace'].includes(e.key)) { e.preventDefault(); go(idx - 1); }
    else if (e.key === 'Home') { e.preventDefault(); go(0); }
    else if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  }, true);
  document.addEventListener('click', function (e) {
    if (!e.target.closest('a,button,input,textarea,select,video,audio,label,svg')) go(idx + 1);
  });
  const hud = document.createElement('div');
  Object.assign(hud.style, {
    position:'fixed', right:'16px', bottom:'12px', padding:'6px 10px',
    fontSize:'20px', borderRadius:'10px', background:'rgba(0,0,0,0.35)',
    color:'#fff', backdropFilter:'blur(3px)', zIndex:9999, userSelect:'none', pointerEvents:'none'
  });
  hud.textContent = (idx+1)+' / '+slides.length+'  •  ← / → or click';
  document.body.appendChild(hud);
})();
</script>
</body>
<script>
function fitSlide(){
    var c=document.querySelector('.content-wrapper');
    if(!c)return;
    var sx=window.innerWidth/1920, sy=window.innerHeight/1080;
    var s=Math.min(sx,sy);
    c.style.transform='translate(-50%,-50%) scale('+s+')';
    var b=document.querySelector('.kmi-badge');
    if(b){b.style.transform='scale('+s+')';b.style.transformOrigin='top right';}
}
fitSlide();
window.addEventListener('resize',fitSlide);
</script>
</html>
