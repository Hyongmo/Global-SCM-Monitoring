<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>부록</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
    overflow: hidden; background: #0a1628;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.slide-container {
    width: 100vw; height: 100vh; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #0a0f1b;
}
.content-area {
    width: 100%; height: 100%; position: relative;
}
@media screen {
    .content-area {
        transform-origin: center center;
    }
}
.digital-grid {
    position: absolute; width: 100%; height: 100%;
    background-image:
        linear-gradient(rgba(0, 183, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 183, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: grid-move 20s linear infinite;
}
@keyframes grid-move {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}
.content-wrapper {
    z-index: 10; color: white;
    width: 1920px; height: 1080px;
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    transform-origin: center center;
    animation: fadeInUp 0.8s ease-out;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px;
}
@keyframes fadeInUp {
    from { opacity: 0; translate: 0 20px; }
    to { opacity: 1; translate: 0 0; }
}
.kmi-badge {
    position: absolute; right: 60px; top: 30px;
    display: flex; align-items: center; gap: 8px;
    z-index: 20;
}
.kmi-badge img {
    height: 28px; width: auto;
    opacity: 0.4;
}
.kmi-badge span {
    font-size: 18px; color: rgba(255,255,255,0.35);
    font-weight: 500;
}
.glow-orb {
    position: absolute; border-radius: 50%; filter: blur(80px);
    animation: orb-drift 20s ease-in-out infinite;
}
@keyframes orb-drift {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(40px, -30px); }
    66% { transform: translate(-20px, 20px); }
}

.divider-label {
    font-size: 28px; font-weight: 700;
    letter-spacing: 6px; text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 24px;
    animation: fadeInUp 0.6s ease-out 0.2s both;
}
.divider-line {
    width: 120px; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(66,165,245,0.6), transparent);
    margin-bottom: 40px;
    animation: fadeInUp 0.6s ease-out 0.3s both;
}
.divider-title {
    font-size: 56px; font-weight: 900;
    background: linear-gradient(135deg, #fff, #64b5f6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    text-align: center;
    line-height: 1.4;
    margin-bottom: 20px;
    animation: fadeInUp 0.6s ease-out 0.4s both;
}
.divider-subtitle {
    font-size: 26px; color: rgba(255,255,255,0.35);
    font-style: italic;
    animation: fadeInUp 0.6s ease-out 0.5s both;
}
.divider-line-bottom {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,217,61,0.4), transparent);
    margin-top: 36px;
    animation: fadeInUp 0.6s ease-out 0.6s both;
}
</style>
</head>
<body>
<div class="slide-container">
<div class="content-area">
    <div class="digital-grid"></div>
    <div class="glow-orb" style="width:400px;height:400px;background:rgba(66,165,245,0.1);top:15%;left:10%;"></div>
    <div class="glow-orb" style="width:350px;height:350px;background:rgba(255,217,61,0.06);bottom:20%;right:15%;animation-delay:-10s;"></div>
    <div class="glow-orb" style="width:300px;height:300px;background:rgba(102,187,106,0.06);top:50%;right:40%;animation-delay:-15s;"></div>

    <div class="content-wrapper">
        <div class="divider-label">APPENDIX</div>
        <div class="divider-line"></div>
        <div class="divider-title">수입 수산물 가격 모니터링<br>및 예측 시스템</div>
        <div class="divider-subtitle">(개발중)</div>
        <div class="divider-line-bottom"></div>
    </div>
    <div class="kmi-badge"><img src="kmi_logo_white.png" alt="KMI"><span>한국해양수산개발원</span></div>
</div>
</div>

<script>
(function () {
  const slides = ["01.html", "02.html", "03.html", "04.html", "05.html", "06.html", "07.html", "08.html", "09.html", "10.html", "11.html", "12.html", "13.html", "14.html", "15.html", "16.html", "17.html", "18.html", "19.html", "20.html", "21.html", "22.html", "23.html", "24.html", "25.html", "26.html", "27.html", "28.html", "29.html", "30.html", "31.html"];
  const current = decodeURIComponent(window.location.pathname.split('/').pop() || '');
  const toNFC = s => (String.prototype.normalize ? s.normalize('NFC') : s);
  const slidesN = slides.map(toNFC);
  let idx = slidesN.indexOf(toNFC(current));
  if (idx < 0) idx = 0;
  function go(i) { const t = slides[(i + slides.length) % slides.length]; if (t) window.location.href = t; }
  window.addEventListener('keydown', function (e) {
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (e.target && (e.target.isContentEditable || ['input','textarea','select'].includes(tag))) return;
    if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); go(idx + 1); }
    else if (['ArrowLeft','PageUp','Backspace'].includes(e.key)) { e.preventDefault(); go(idx - 1); }
    else if (e.key === 'Home') { e.preventDefault(); go(0); }
    else if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  }, true);
  document.addEventListener('click', function (e) {
    if (!e.target.closest('a,button,input,textarea,select,video,audio,label,svg')) go(idx + 1);
  });
  const hud = document.createElement('div');
  Object.assign(hud.style, {
    position:'fixed', right:'16px', bottom:'12px', padding:'6px 10px',
    fontSize:'20px', borderRadius:'10px', background:'rgba(0,0,0,0.35)',
    color:'#fff', backdropFilter:'blur(3px)', zIndex:9999, userSelect:'none', pointerEvents:'none'
  });
  hud.textContent = (idx+1)+' / '+slides.length+'  •  ← / → or click';
  document.body.appendChild(hud);
})();
</script>
</body>
<script>
function fitSlide(){
    var c=document.querySelector('.content-wrapper');
    if(!c)return;
    var sx=window.innerWidth/1920, sy=window.innerHeight/1080;
    var s=Math.min(sx,sy);
    c.style.transform='translate(-50%,-50%) scale('+s+')';
    var b=document.querySelector('.kmi-badge');
    if(b){b.style.transform='scale('+s+')';b.style.transformOrigin='top right';}
}
fitSlide();
window.addEventListener('resize',fitSlide);
</script>
</html>
